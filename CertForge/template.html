<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CertForge — IT Certification Practice Questions</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
  --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
  --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
  --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;--space-20:5rem;
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;
  --tr:180ms cubic-bezier(.16,1,.3,1);
  --font-body:'Geist','Segoe UI',sans-serif;
  --font-mono:'JetBrains Mono','Consolas',monospace;
  --sidebar-w:288px;
}
:root,[data-theme='dark']{
  --bg:#101418;--surface:#151a20;--surface2:#1a2028;--offset:#1e2530;
  --divider:#232b36;--border:#303a48;--text:#d3dae3;--muted:#8593a3;--faint:#5b6675;
  --primary:#56a8ff;--primary-h:#7cbcff;--primary-dim:rgba(86,168,255,.12);
  --success:#5fb96a;--success-dim:rgba(95,185,106,.14);
  --error:#e0687a;--error-dim:rgba(224,104,122,.14);
  --shadow:0 4px 12px rgba(0,0,0,.3);
}
[data-theme='light']{
  --bg:#f4f6f8;--surface:#fbfcfd;--surface2:#fff;--offset:#eceff3;
  --divider:#dde3ea;--border:#c8d1dc;--text:#1d2530;--muted:#5c6a7c;--faint:#97a3b2;
  --primary:#0a66c2;--primary-h:#0850a0;--primary-dim:rgba(10,102,194,.1);
  --success:#2e7d3a;--success-dim:rgba(46,125,58,.12);
  --error:#b3324b;--error-dim:rgba(179,50,75,.1);
  --shadow:0 4px 12px rgba(20,30,45,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}
body{min-height:100dvh;line-height:1.6;font-family:var(--font-body);font-size:var(--text-base);color:var(--text);background:var(--bg)}
svg{display:block}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a{color:var(--primary);text-decoration:none}
a:hover{color:var(--primary-h)}
:focus-visible{outline:2px solid var(--primary);outline-offset:3px;border-radius:var(--radius-sm)}
a,button{transition:color var(--tr),background var(--tr),border-color var(--tr),box-shadow var(--tr)}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}

/* Header */
.hdr{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-3) var(--space-6);
  border-bottom:1px solid var(--divider);background:var(--surface);position:sticky;top:0;z-index:60}
.brand{display:flex;align-items:center;gap:var(--space-3);color:var(--text);font-weight:600;font-size:var(--text-sm)}
.brand svg{color:var(--primary)}
.brand:hover{color:var(--text)}
.sp{flex:1}
.ibtn{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;
  border-radius:var(--radius-md);color:var(--muted);border:1px solid transparent}
.ibtn:hover{color:var(--text);background:var(--offset)}

/* Global search */
.gsearch{position:relative;display:flex;align-items:center;width:min(460px,46vw)}
.gsearch .gs-icon{position:absolute;left:12px;color:var(--muted);pointer-events:none}
.gs-input{width:100%;height:40px;padding:0 40px 0 38px;border-radius:var(--radius-md);
  border:1px solid var(--border);background:var(--offset);color:var(--text);font-size:var(--text-sm);
  font-family:inherit;outline:none;transition:border-color .15s,background .15s}
.gs-input::placeholder{color:var(--faint)}
.gs-input:focus{border-color:var(--primary);background:var(--surface)}
.gs-clear{position:absolute;right:8px;display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:var(--radius-sm);color:var(--muted)}
.gs-clear:hover{color:var(--text);background:var(--divider)}

/* Search results */
.sresults{display:flex;flex-direction:column;gap:var(--space-3);margin-top:var(--space-5)}
.sr-item{display:block;padding:var(--space-4) var(--space-5);border:1px solid var(--border);
  border-radius:var(--radius-md);background:var(--surface);transition:border-color .15s,transform .1s}
.sr-item:hover{border-color:var(--primary);transform:translateY(-1px)}
.sr-meta{display:flex;align-items:center;gap:var(--space-3);margin-bottom:6px;
  font-family:var(--font-mono);font-size:var(--text-xs);color:var(--primary);letter-spacing:.04em}
.sr-meta .sr-cert{color:var(--text);font-weight:600}
.sr-q{color:var(--text);font-size:var(--text-sm);line-height:1.5}
.sr-ans{margin-top:6px;font-size:var(--text-xs);color:var(--muted)}
.sr-item mark{background:rgba(56,189,168,.24);color:var(--text);border-radius:3px;padding:0 2px}
.sr-empty{padding:var(--space-8) 0;text-align:center;color:var(--muted)}
.sr-sec{font-size:var(--text-md);font-weight:600;color:var(--text);margin:var(--space-7) 0 var(--space-1);
  display:flex;align-items:center;gap:var(--space-3);padding-bottom:var(--space-2);border-bottom:1px solid var(--divider)}
.sr-sec:first-of-type{margin-top:var(--space-2)}
.sr-sec-n{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--primary);border:1px solid var(--divider);border-radius:999px;padding:1px 8px;font-weight:400}
.qcard.qhit{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary)}
@media(max-width:860px){.gsearch{width:auto;flex:1}.hdr .sp{display:none}}

/* Layout */
.layout{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:calc(100dvh - 63px)}
.side{border-right:1px solid var(--divider);background:var(--surface);padding:var(--space-5) var(--space-3);
  position:sticky;top:63px;height:calc(100dvh - 63px);overflow-y:auto}
.side-home{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);
  border-radius:var(--radius-md);color:var(--muted);font-size:var(--text-sm);font-weight:550;margin-bottom:var(--space-4)}
.side-home:hover{color:var(--text);background:var(--offset)}
.side-home.active{color:var(--primary);background:var(--primary-dim)}
.side-label{font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.1em;color:var(--faint);
  padding:0 var(--space-3);margin-bottom:var(--space-2)}

/* Dropdown groups */
.grp{margin-bottom:var(--space-1)}
.grp-btn{display:flex;align-items:center;gap:var(--space-2);width:100%;text-align:left;
  padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);color:var(--text);
  font-size:var(--text-sm);font-weight:550}
.grp-btn:hover{background:var(--offset)}
.grp-btn.has-active{color:var(--primary)}
.grp-btn .chev{margin-left:auto;color:var(--faint);transition:transform var(--tr);flex-shrink:0}
.grp.open .grp-btn .chev{transform:rotate(90deg)}
.grp-btn .gcode{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--faint);flex-shrink:0}
.grp-sub{overflow:hidden;max-height:0;transition:max-height var(--tr)}
.grp.open .grp-sub{max-height:2000px}
.grp-sub ul{list-style:none;padding:var(--space-1) 0 var(--space-2)}
.grp-sub a{display:flex;justify-content:space-between;align-items:baseline;gap:var(--space-2);
  padding:var(--space-2) var(--space-3) var(--space-2) var(--space-8);border-radius:var(--radius-md);
  color:var(--muted);font-size:var(--text-sm)}
.grp-sub a:hover{color:var(--text);background:var(--offset)}
.grp-sub a.active{color:var(--primary);background:var(--primary-dim);font-weight:550}
.grp-sub a .range{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--faint)}
.grp-sub .overview{padding-left:var(--space-8)}
/* Study book sub-nav (nested) */
.grp-sub .book-head{display:flex;align-items:center;gap:var(--space-2);width:100%;text-align:left;
  padding:var(--space-2) var(--space-3) var(--space-2) var(--space-8);border-radius:var(--radius-md);
  color:var(--muted);font-size:var(--text-sm)}
.grp-sub .book-head:hover{color:var(--text);background:var(--offset)}
.grp-sub .book-head svg{color:var(--primary)}
.grp-sub .book-head .chev2{margin-left:auto;color:var(--faint);transition:transform var(--tr);flex-shrink:0}
.book-wrap.open .book-head .chev2{transform:rotate(90deg)}
.book-wrap .book-chs{overflow:hidden;max-height:0;transition:max-height var(--tr)}
.book-wrap.open .book-chs{max-height:4000px}
.book-wrap .book-chs a{padding:var(--space-1) var(--space-3) var(--space-1) calc(var(--space-8) + var(--space-4));
  font-size:var(--text-xs);color:var(--faint);gap:var(--space-2)}
.book-wrap .book-chs a .chn{font-family:var(--font-mono);flex-shrink:0}
.book-wrap .book-chs a.active{color:var(--primary);background:var(--primary-dim);font-weight:550}
.grp-sub .book-head.active{color:var(--primary);background:var(--primary-dim);font-weight:550}

/* Content */
.main{padding:var(--space-8) var(--space-8) var(--space-20);max-width:900px;margin-inline:auto;width:100%}
.home-hero{margin-bottom:var(--space-10);max-width:640px}
.kicker{font-family:var(--font-mono);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.14em;color:var(--primary);margin-bottom:var(--space-3)}
.home-hero h1{font-size:var(--text-xl);font-weight:650;margin-bottom:var(--space-4);line-height:1.15;text-wrap:balance}
.home-hero p{color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:var(--space-4)}
.card{display:flex;flex-direction:column;gap:var(--space-2);padding:var(--space-5);border-radius:var(--radius-lg);
  background:var(--surface2);border:1px solid var(--divider);color:var(--text);cursor:pointer;text-align:left}
.card:hover{border-color:var(--primary);box-shadow:var(--shadow)}
.card .code{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--faint);letter-spacing:.08em}
.card h2{font-size:var(--text-lg);font-weight:600}
.card .cmeta{font-size:var(--text-sm);color:var(--muted)}
.card .ccount{margin-top:auto;padding-top:var(--space-3);font-family:var(--font-mono);font-size:var(--text-xs);color:var(--primary)}

.phead{margin-bottom:var(--space-6)}
.phead h1{font-size:var(--text-xl);font-weight:650;margin-bottom:var(--space-1);line-height:1.15}
.phead .psub{color:var(--muted);font-size:var(--text-sm)}
.crumbs{font-size:var(--text-sm);color:var(--muted);margin-bottom:var(--space-4)}
.crumbs a{color:var(--muted)}.crumbs a:hover{color:var(--text)}

/* Cert overview */
.ov-sets{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:var(--space-3);margin-top:var(--space-5)}
.ov-set{padding:var(--space-4);border:1px solid var(--divider);border-radius:var(--radius-md);background:var(--surface2);color:var(--text);text-align:left}
.ov-set:hover{border-color:var(--primary)}
.ov-set .n{font-weight:600;font-size:var(--text-sm)}
.ov-set .r{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--faint)}

.pager{display:flex;align-items:center;gap:var(--space-3);margin:var(--space-6) 0}
.pager button{padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);border:1px solid var(--border);
  color:var(--text);font-size:var(--text-sm);background:var(--surface)}
.pager button:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
.pager button:disabled{opacity:.4;cursor:default}
.pager .info{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--muted)}
.pager .sp{flex:1}

.qcard{background:var(--surface2);border:1px solid var(--divider);border-radius:var(--radius-lg);padding:var(--space-6);margin-bottom:var(--space-5)}
.qnum{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--primary);margin-bottom:var(--space-2);letter-spacing:.06em}
.qtext{font-size:var(--text-base);font-weight:550;margin-bottom:var(--space-4)}
.opts{display:flex;flex-direction:column;gap:var(--space-2);list-style:none}
.opt{display:flex;gap:var(--space-3);align-items:baseline;width:100%;text-align:left;padding:var(--space-3) var(--space-4);
  border-radius:var(--radius-md);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:var(--text-sm);line-height:1.5}
.opt:hover{border-color:var(--primary)}
.opt .lt{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--muted);flex-shrink:0}
.qcard.answered .opt{cursor:default}
.qcard.answered .opt:hover{border-color:var(--border)}
.opt.correct{border-color:var(--success);background:var(--success-dim)}
.opt.correct .lt{color:var(--success)}
.opt.incorrect{border-color:var(--error);background:var(--error-dim)}
.opt.incorrect .lt{color:var(--error)}
.qcard.answered .opt.correct:hover{border-color:var(--success)}
.qcard.answered .opt.incorrect:hover{border-color:var(--error)}
.explain{display:none;margin-top:var(--space-4);padding:var(--space-3) var(--space-4);border-left:3px solid var(--primary);
  background:var(--primary-dim);border-radius:0 var(--radius-md) var(--radius-md) 0;font-size:var(--text-sm);color:var(--text)}
.qcard.answered .explain{display:block}
.reveal{margin-top:var(--space-3);font-size:var(--text-xs);font-family:var(--font-mono);color:var(--muted);letter-spacing:.05em}
.reveal:hover{color:var(--primary)}
.qcard.answered .reveal{display:none}

/* ===== Study Book rendering ===== */
.book-overview .toc{display:flex;flex-direction:column;gap:var(--space-2);margin-top:var(--space-5)}
.toc-item{display:flex;gap:var(--space-4);align-items:flex-start;padding:var(--space-4) var(--space-5);
  border:1px solid var(--divider);border-radius:var(--radius-md);background:var(--surface2);color:var(--text);text-align:left;width:100%}
.toc-item:hover{border-color:var(--primary);box-shadow:var(--shadow)}
.toc-item .tnum{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--primary);flex-shrink:0;padding-top:2px;min-width:2.4em}
.toc-item .tbody{display:flex;flex-direction:column;gap:var(--space-1)}
.toc-item .tt{font-weight:600;font-size:var(--text-base)}
.toc-item .ts{font-size:var(--text-sm);color:var(--muted)}
.book-badge{display:inline-block;font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:.08em;
  color:var(--primary);background:var(--primary-dim);padding:2px 10px;border-radius:999px;margin-bottom:var(--space-3)}

/* Prose */
.prose{max-width:760px}
.prose h2{font-size:var(--text-lg);font-weight:650;margin:var(--space-8) 0 var(--space-3);line-height:1.25;scroll-margin-top:80px}
.prose h3{font-size:var(--text-base);font-weight:600;margin:var(--space-6) 0 var(--space-2);color:var(--text)}
.prose h2:first-child,.prose h3:first-child{margin-top:0}
.prose p{margin:0 0 var(--space-4);color:var(--text);line-height:1.7}
.prose ul,.prose ol{margin:0 0 var(--space-4) var(--space-6);color:var(--text);line-height:1.7}
.prose li{margin-bottom:var(--space-2)}
.prose table{width:100%;border-collapse:collapse;margin:0 0 var(--space-5);font-size:var(--text-sm);
  border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden}
.prose thead th{background:var(--offset);text-align:left;padding:var(--space-3) var(--space-4);font-weight:600;
  color:var(--text);border-bottom:1px solid var(--border)}
.prose tbody td{padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--divider);color:var(--text);vertical-align:top}
.prose tbody tr:last-child td{border-bottom:none}
.prose tbody tr:nth-child(even){background:var(--surface2)}
.prose code.inline{font-family:var(--font-mono);font-size:.88em;background:var(--offset);padding:1px 6px;border-radius:var(--radius-sm);color:var(--primary-h)}

/* Callouts */
.callout{margin:0 0 var(--space-5);padding:var(--space-4) var(--space-5);border-radius:var(--radius-md);
  border-left:3px solid var(--primary);background:var(--primary-dim)}
.callout .ct{font-weight:600;font-size:var(--text-sm);margin-bottom:var(--space-1);display:flex;align-items:center;gap:var(--space-2)}
.callout p{margin:0;font-size:var(--text-sm);color:var(--text)}
.callout.note{border-color:var(--primary);background:var(--primary-dim)}
.callout.note .ct{color:var(--primary)}
.callout.tip{border-color:var(--success);background:var(--success-dim)}
.callout.tip .ct{color:var(--success)}
.callout.warning{border-color:var(--error);background:var(--error-dim)}
.callout.warning .ct{color:var(--error)}
.callout.exam{border-color:#e0a63a;background:rgba(224,166,58,.12)}
.callout.exam .ct{color:#e0a63a}

/* Code block */
pre.code{margin:0 0 var(--space-5);padding:var(--space-4);background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-md);overflow-x:auto;font-family:var(--font-mono);font-size:var(--text-xs);
  line-height:1.6;color:var(--text)}
pre.code .clang{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:var(--space-2)}

/* Terminal */
.term{margin:0 0 var(--space-6);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;
  background:#0c1016;box-shadow:var(--shadow)}
[data-theme='light'] .term{background:#12161d}
.term-bar{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);
  background:#161c25;border-bottom:1px solid #232b36}
.term-bar .dots{display:flex;gap:6px}
.term-bar .dots i{width:11px;height:11px;border-radius:50%;display:block}
.term-bar .dots i:nth-child(1){background:#e0687a}
.term-bar .dots i:nth-child(2){background:#e0a63a}
.term-bar .dots i:nth-child(3){background:#5fb96a}
.term-bar .tttl{font-family:var(--font-mono);font-size:11px;color:#8593a3;letter-spacing:.04em}
.term-body{padding:var(--space-3) var(--space-4);overflow-x:auto;font-family:var(--font-mono);
  font-size:12.5px;line-height:1.65;color:#c8d3e0;white-space:pre;-webkit-font-smoothing:auto}
.term-line{white-space:pre}
.term-prompt .usr{color:#5fb96a}
.term-prompt .at{color:#c8d3e0}
.term-prompt .host{color:#56a8ff}
.term-prompt .cwd{color:#e0a63a}
.term-prompt .sig{color:#8593a3}
.term-prompt .cmd{color:#fff}
.term-out{color:#9aa7b6}
.term-cmt{color:#5b6675;font-style:italic}
.term-cmt::before{content:'# '}

.chap-nav{display:flex;gap:var(--space-3);margin-top:var(--space-10);padding-top:var(--space-5);border-top:1px solid var(--divider)}
.chap-nav button{flex:1;padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border:1px solid var(--border);
  color:var(--text);font-size:var(--text-sm);background:var(--surface);text-align:left}
.chap-nav button:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
.chap-nav button:disabled{opacity:.4;cursor:default}
.chap-nav button.next{text-align:right}
.chap-nav .cnlbl{display:block;font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;color:var(--faint);text-transform:uppercase}

/* ===== Terminal Testing lab ===== */
.lab-tabs{display:flex;gap:var(--space-2);margin:var(--space-5) 0 var(--space-4);border-bottom:1px solid var(--divider)}
.lab-tab{padding:var(--space-3) var(--space-4);font-size:var(--text-sm);font-weight:550;color:var(--muted);
  border-bottom:2px solid transparent;margin-bottom:-1px}
.lab-tab:hover{color:var(--text)}
.lab-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.lab-toolbar{display:flex;flex-wrap:wrap;gap:var(--space-2);align-items:center;margin-bottom:var(--space-3)}
.lab-btn{font-size:var(--text-xs);font-family:var(--font-mono);padding:var(--space-2) var(--space-3);
  border:1px solid var(--border);border-radius:var(--radius-md);color:var(--muted);background:var(--surface)}
.lab-btn:hover{border-color:var(--primary);color:var(--primary)}
.lab-btn.primary{background:var(--primary);color:#04121f;border-color:var(--primary);font-weight:650}
.lab-btn.primary:hover{filter:brightness(1.08);color:#04121f}
.lab-hint{font-size:var(--text-xs);color:var(--faint);margin-left:auto}

/* Interactive console */
.console{background:#0a0e14;border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow)}
.console .term-bar{background:#12171f;border-bottom:1px solid #232b36}
.console-scroll{height:460px;overflow-y:auto;padding:var(--space-3) var(--space-4);
  font-family:var(--font-mono);font-size:12.5px;line-height:1.6;color:#c8d3e0}
.console-scroll .cl{white-space:pre-wrap;word-break:break-word}
.cl.echo .cp{color:#56a8ff}
.cl.echo .cc{color:#fff}
.cl.out{color:#c8d3e0}
.cl.err{color:#e0687a}
.cl.info{color:#8593a3}
.cl.diag{color:#e0a63a;font-style:italic}
.console-input-row{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);
  border-top:1px solid #232b36;background:#0c1119;font-family:var(--font-mono);font-size:12.5px}
.console-input-row .cpr{color:#56a8ff;white-space:pre;flex-shrink:0}
.console-input-row input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:var(--font-mono);font-size:12.5px;padding:6px 0}
.console-input-row input::placeholder{color:#3d4652}

/* Script validator */
.script-grid{display:grid;grid-template-columns:1fr;gap:var(--space-4)}
.script-ed textarea{width:100%;min-height:280px;resize:vertical;background:#0a0e14;color:#e6edf3;
  border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--space-4);
  font-family:var(--font-mono);font-size:12.5px;line-height:1.6;outline:none}
.script-ed textarea:focus{border-color:var(--primary)}
.report{border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;background:var(--surface2)}
.report-head{display:flex;gap:var(--space-4);padding:var(--space-3) var(--space-4);background:var(--offset);
  border-bottom:1px solid var(--border);font-size:var(--text-sm);flex-wrap:wrap}
.report-head .pill{font-family:var(--font-mono);font-size:var(--text-xs);padding:2px 10px;border-radius:999px}
.pill.ok{background:var(--success-dim);color:var(--success)}
.pill.bad{background:var(--error-dim);color:var(--error)}
.pill.neutral{background:var(--offset);color:var(--muted)}
.report-body{max-height:520px;overflow-y:auto;font-family:var(--font-mono);font-size:12px;line-height:1.55}
.rline{display:flex;gap:var(--space-3);padding:var(--space-2) var(--space-4);border-bottom:1px solid var(--divider)}
.rline:last-child{border-bottom:none}
.rline .rn{color:var(--faint);flex-shrink:0;min-width:2.2em;text-align:right}
.rline .rc{flex:1;min-width:0}
.rline .rcmd{color:var(--text)}
.rline .rmsg{display:block;margin-top:3px}
.rline.g{background:transparent}
.rline.g .status{color:var(--success)}
.rline.e{background:var(--error-dim)}
.rline.e .rmsg{color:var(--error)}
.rline.i .rmsg{color:var(--muted)}
.rline .status{flex-shrink:0;font-size:11px}
.report-empty{padding:var(--space-8);text-align:center;color:var(--faint);font-family:var(--font-sans)}
@media(min-width:1000px){.script-grid{grid-template-columns:1fr 1fr}}
.sample-pick{font-size:var(--text-xs);color:var(--muted);display:flex;align-items:center;gap:6px}
.sample-pick select{font-family:var(--font-mono);font-size:var(--text-xs);padding:5px 8px;border:1px solid var(--border);
  border-radius:var(--radius-md);background:var(--surface);color:var(--text);outline:none}
.sample-pick select:focus{border-color:var(--primary)}

/* ===== Script Samples library ===== */
.ss-controls{display:flex;flex-wrap:wrap;gap:var(--space-2);align-items:center;margin:var(--space-5) 0 var(--space-4)}
.ss-search{flex:1;min-width:220px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
  padding:var(--space-3) var(--space-4);color:var(--text);font-size:var(--text-sm);outline:none}
.ss-search:focus{border-color:var(--primary)}
.ss-filters{display:flex;flex-wrap:wrap;gap:6px}
.ss-chip{font-size:var(--text-xs);font-family:var(--font-mono);padding:5px 11px;border-radius:999px;
  border:1px solid var(--border);color:var(--muted);background:var(--surface);cursor:pointer}
.ss-chip:hover{border-color:var(--primary);color:var(--primary)}
.ss-chip.active{background:var(--primary);color:#04121f;border-color:var(--primary);font-weight:650}
.ss-count{font-size:var(--text-xs);color:var(--faint);margin-left:auto;font-family:var(--font-mono)}
.ss-list{display:flex;flex-direction:column;gap:var(--space-3)}
.ss-card{border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface2);overflow:hidden}
.ss-card-head{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-4);cursor:pointer}
.ss-card-head:hover{background:var(--offset)}
.ss-idx{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--faint);min-width:2.4em}
.ss-meta{flex:1;min-width:0}
.ss-title{font-weight:600;font-size:var(--text-sm);color:var(--text);display:block}
.ss-purpose{font-size:var(--text-xs);color:var(--muted);margin-top:2px}
.ss-tags{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.ss-lvl{font-family:var(--font-mono);font-size:10.5px;padding:2px 8px;border-radius:999px;font-weight:650}
.ss-lvl.CCNA{background:var(--success-dim);color:var(--success)}
.ss-lvl.CCNP{background:rgba(86,168,255,.15);color:var(--primary)}
.ss-lvl.CCIE{background:rgba(224,166,58,.16);color:#e0a63a}
.ss-lvl.CORE{background:var(--success-dim);color:var(--success)}
.ss-lvl.INTER{background:rgba(86,168,255,.15);color:var(--primary)}
.ss-lvl.ADV{background:rgba(224,166,58,.16);color:#e0a63a}
.ss-cat{font-family:var(--font-mono);font-size:10.5px;padding:2px 8px;border-radius:999px;background:var(--offset);color:var(--muted)}
.ss-body{display:none;border-top:1px solid var(--border);background:#0a0e14}
.ss-card.open .ss-body{display:block}
.ss-code{font-family:var(--font-mono);font-size:12px;line-height:1.6;color:#c8d3e0;white-space:pre;overflow-x:auto;
  padding:var(--space-4)}
.ss-code .ck{color:#56a8ff}.ss-code .cm{color:#5f7285;font-style:italic}
.ss-explain{padding:var(--space-4);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:var(--space-3)}
.ss-ex-row{display:flex;gap:var(--space-3);align-items:flex-start}
.ss-ex-tag{flex:0 0 auto;width:150px;font-family:var(--font-mono);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:6px;text-align:center}
.ss-ex-row.ok .ss-ex-tag{background:rgba(95,185,106,.16);color:#5fb96a}
.ss-ex-row.bad .ss-ex-tag{background:rgba(224,104,122,.16);color:#e0687a}
.ss-ex-row.note .ss-ex-tag{background:rgba(86,168,255,.16);color:#56a8ff}
.ss-ex-txt{flex:1;font-size:13px;line-height:1.55;color:#c8d3e0}
@media(max-width:640px){.ss-ex-row{flex-direction:column;gap:4px}.ss-ex-tag{width:auto;align-self:flex-start}}
.ss-actions{display:flex;gap:var(--space-2);padding:0 var(--space-4) var(--space-4)}
.ss-empty{padding:var(--space-8);text-align:center;color:var(--faint)}
.ss-copied{color:var(--success)!important;border-color:var(--success)!important}

.menu-btn{display:none}
.backdrop{display:none}
@media(max-width:860px){
  .layout{grid-template-columns:1fr}
  .menu-btn{display:inline-flex}
  .side{position:fixed;top:63px;left:0;width:min(84vw,300px);z-index:70;transform:translateX(-100%);
    transition:transform 220ms cubic-bezier(.16,1,.3,1);box-shadow:var(--shadow)}
  .side.open{transform:translateX(0)}
  .backdrop.show{display:block;position:fixed;inset:63px 0 0 0;background:rgba(0,0,0,.45);z-index:65}
  .main{padding:var(--space-6) var(--space-4) var(--space-16)}
  .pbq-grid{grid-template-columns:1fr !important}
  .pbq-match-row{flex-direction:column;align-items:stretch}
}

/* ===== Performance-Based Questions (labs) ===== */
/* Labs index (clickable cards, grouped by domain) */
.lab-index{display:flex;flex-direction:column;gap:var(--space-7)}
.lab-set-h{font-size:var(--text-md);font-weight:600;margin:0 0 var(--space-3);display:flex;align-items:center;gap:var(--space-3);color:var(--text)}
.lab-set-n{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--primary);border:1px solid var(--divider);border-radius:999px;padding:1px 8px}
.lab-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:var(--space-3)}
.lab-card{display:flex;flex-direction:column;gap:6px;text-decoration:none;background:var(--surface2);
  border:1px solid var(--divider);border-radius:var(--radius-md);padding:var(--space-4);transition:border-color .15s,transform .15s,background .15s}
.lab-card:hover{border-color:var(--primary);transform:translateY(-2px);background:var(--surface)}
.lab-card-no{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--primary);letter-spacing:.06em}
.lab-card-kind{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.lab-card-title{font-size:var(--text-sm);font-weight:600;color:var(--text);line-height:1.4}
/* single-lab nav bar */
.lab-navbar{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);flex-wrap:wrap;
  margin-bottom:var(--space-5);padding-bottom:var(--space-4);border-bottom:1px solid var(--divider)}
.lab-navbar-bottom{margin-top:var(--space-6);border-bottom:none;border-top:1px solid var(--divider);padding-top:var(--space-4);padding-bottom:0}
.lab-back{text-decoration:none;color:var(--primary);font-size:var(--text-sm);font-weight:600}
.lab-back:hover{text-decoration:underline}
.lab-pos{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--muted)}
.lab-nav-btns{display:flex;gap:var(--space-2)}
.lab-nav-b{text-decoration:none;font-size:var(--text-sm);color:var(--text);border:1px solid var(--divider);
  border-radius:var(--radius-sm);padding:6px 14px;background:var(--surface2);transition:border-color .15s,background .15s}
.lab-nav-b:hover{border-color:var(--primary);background:var(--surface)}
.lab-nav-b.disabled{color:var(--muted);opacity:.45;pointer-events:none}
.dom-note{border:1px solid var(--divider);background:var(--surface2);border-radius:var(--radius-md);
  padding:var(--space-4) var(--space-5);margin:var(--space-4) 0 var(--space-6);color:var(--muted);font-size:var(--text-sm);line-height:1.6}
.lab-intro{border:1px solid var(--divider);background:var(--surface2);border-radius:var(--radius-md);
  padding:var(--space-4) var(--space-5);margin-bottom:var(--space-6);color:var(--muted);font-size:var(--text-sm);line-height:1.6}
.lab-intro strong{color:var(--text)}
.pbq{background:var(--surface2);border:1px solid var(--divider);border-radius:var(--radius-lg);
  padding:var(--space-6);margin-bottom:var(--space-6)}
.pbq-head{margin-bottom:var(--space-4)}
.pbq-tag{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--primary);letter-spacing:.06em;
  display:flex;gap:var(--space-3);flex-wrap:wrap;margin-bottom:var(--space-2)}
.pbq-tag .kind{color:var(--muted);text-transform:uppercase}
.pbq h3{font-size:var(--text-lg);font-weight:600;margin:0 0 var(--space-2)}
.pbq-scn{font-size:var(--text-sm);color:var(--text);line-height:1.6;margin-bottom:var(--space-4)}
/* exhibit (Refer-to-the-exhibit) questions */
.pbq-exhibit{border:1px solid var(--divider);border-radius:var(--radius-md);background:var(--surface);
  padding:var(--space-4);margin-bottom:var(--space-4)}
.pbq-exhibit .ex-cap{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:var(--space-3)}
.pbq-topo{width:100%;max-width:640px;margin:0 auto var(--space-3);display:block}
.pbq-topo text{font-family:var(--font-sans);fill:var(--text)}
.pbq-cli{font-family:var(--font-mono);font-size:12px;line-height:1.5;background:#0d1117;color:#c9d1d9;
  border:1px solid var(--divider);border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);
  overflow-x:auto;white-space:pre;margin:0}
.pbq-qtext{font-size:var(--text-sm);font-weight:600;color:var(--text);margin:var(--space-2) 0 var(--space-3);line-height:1.5}
.pbq-opts{display:flex;flex-direction:column;gap:var(--space-2);margin-bottom:var(--space-2)}
.pbq-opt{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3) var(--space-4);
  border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface);cursor:pointer;
  font-size:var(--text-sm);text-align:left;transition:border-color 120ms,background 120ms;width:100%}
.pbq-opt:hover{border-color:var(--primary)}
.pbq-opt.sel{border-color:var(--primary);background:var(--primary-dim)}
.pbq-opt .lt{font-family:var(--font-mono);font-weight:700;color:var(--primary);flex:0 0 auto}
.pbq-opt.right{border-color:var(--success);background:var(--success-dim)}
.pbq-opt.wrong{border-color:var(--error);background:var(--error-dim)}
/* draggable tokens */
.pbq-pool{display:flex;flex-wrap:wrap;gap:var(--space-2);padding:var(--space-3);border:1px dashed var(--border);
  border-radius:var(--radius-md);background:var(--surface);min-height:52px;margin-bottom:var(--space-4)}
.pbq-pool.empty::before{content:'All items placed';color:var(--faint);font-size:var(--text-xs);font-style:italic}
.tok{display:inline-flex;align-items:center;gap:6px;padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);
  border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:var(--text-sm);cursor:grab;
  user-select:none;line-height:1.3}
.tok:hover{border-color:var(--primary)}
.tok.dragging{opacity:.45}
.tok .grip{color:var(--faint);font-family:var(--font-mono);font-size:11px}
/* match / categorize layout */
.pbq-grid{display:grid;gap:var(--space-3);margin-bottom:var(--space-4)}
.pbq-match-row{display:flex;gap:var(--space-3);align-items:stretch}
.pbq-match-lbl{flex:0 0 42%;display:flex;align-items:center;padding:var(--space-3) var(--space-4);
  background:var(--surface);border:1px solid var(--divider);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:550}
.drop{flex:1;min-height:48px;border:1px dashed var(--border);border-radius:var(--radius-md);background:var(--surface);
  padding:var(--space-2);display:flex;flex-wrap:wrap;gap:var(--space-2);align-items:center;transition:border-color 120ms,background 120ms}
.drop.over{border-color:var(--primary);background:var(--primary-dim)}
.drop .ph{color:var(--faint);font-size:var(--text-xs);font-style:italic;padding:0 var(--space-2)}
.bucket{border:1px solid var(--divider);border-radius:var(--radius-md);background:var(--surface);overflow:hidden}
.bucket-h{padding:var(--space-2) var(--space-4);font-size:var(--text-sm);font-weight:600;background:var(--surface2);
  border-bottom:1px solid var(--divider)}
.bucket .drop{border:none;border-radius:0;min-height:60px;align-items:flex-start}
/* order (sequence) */
.pbq-seq{list-style:none;display:flex;flex-direction:column;gap:var(--space-2);margin-bottom:var(--space-4);
  counter-reset:seq}
.pbq-seq li{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);
  border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface);cursor:grab;user-select:none;
  font-size:var(--text-sm)}
.pbq-seq li:hover{border-color:var(--primary)}
.pbq-seq li.dragging{opacity:.45}
.pbq-seq li::before{counter-increment:seq;content:counter(seq);font-family:var(--font-mono);font-size:var(--text-xs);
  color:var(--primary);flex-shrink:0;width:1.4em;text-align:center}
.pbq-seq li .grip{margin-left:auto;color:var(--faint);font-family:var(--font-mono)}
/* fill-in */
.pbq-fill{display:flex;flex-direction:column;gap:var(--space-3);margin-bottom:var(--space-4)}
.pbq-fill label{display:flex;flex-direction:column;gap:var(--space-2);font-size:var(--text-sm)}
.pbq-fill input{padding:var(--space-3) var(--space-4);border:1px solid var(--border);border-radius:var(--radius-md);
  background:var(--surface);color:var(--text);font-family:var(--font-mono);font-size:var(--text-sm)}
.pbq-fill input:focus{outline:none;border-color:var(--primary)}
/* graded states */
.drop.right,.pbq-seq li.right,.pbq-fill input.right{border-color:var(--success);background:var(--success-dim)}
.drop.wrong,.pbq-seq li.wrong,.pbq-fill input.wrong{border-color:var(--error);background:var(--error-dim)}
.tok.right{border-color:var(--success);background:var(--success-dim)}
.tok.wrong{border-color:var(--error);background:var(--error-dim)}
.pbq-actions{display:flex;gap:var(--space-3);align-items:center;flex-wrap:wrap}
.pbq-btn{padding:var(--space-2) var(--space-5);border-radius:var(--radius-md);border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:var(--text-sm);font-weight:550;cursor:pointer}
.pbq-btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
.pbq-btn:hover{border-color:var(--primary)}
.pbq-btn.primary:hover{opacity:.92}
.pbq-score{font-family:var(--font-mono);font-size:var(--text-sm);font-weight:600}
.pbq-score.pass{color:var(--success)}
.pbq-score.fail{color:var(--error)}
.pbq-expl{display:none;margin-top:var(--space-4);padding:var(--space-3) var(--space-4);border-left:3px solid var(--primary);
  background:var(--primary-dim);border-radius:0 var(--radius-md) var(--radius-md) 0;font-size:var(--text-sm);line-height:1.6}
.pbq.graded .pbq-expl{display:block}
</style>

  // Precompute per-cert domain groupings: DOMAINS[cert] = {domains:[names], map:[idx per question]}
  // domainGroups(cert) -> [{name, qs:[globalQuestionIndex,...]}] preserving question order.
  function domainGroups(cert){
    var dm=DOMAINS[cert]; if(!dm||!dm.domains||!dm.map) return null;
    var groups=dm.domains.map(function(nm){return {name:nm, qs:[]};});
    for(var i=0;i<dm.map.length;i++){ var d=dm.map[i]; if(groups[d]) groups[d].qs.push(i); }
    // drop empty domains (e.g. an unused General bucket)
    return groups.filter(function(g){return g.qs.length>0;});
  }

  function wireLive(){
    var cfg=labCfg(LAB.cert);
    var scroll=main.querySelector('#labScroll');
    var input=main.querySelector('#labInput');
    var promptEl=main.querySelector('#labPrompt');
    if(!scroll||!input) return;
    // welcome
    cfg.welcome.forEach(function(w){ labWrite(scroll,'info',w); });
    labWrite(scroll,'out','');
    promptEl.textContent=LAB.dev.prompt();
    function refresh(){promptEl.textContent=LAB.dev.prompt();}
    input.focus();
    input.addEventListener('keydown',function(e){
      if(e.key==='Enter'){
        var cmd=input.value;
        var pr=LAB.dev.prompt();
        labEcho(scroll,pr,cmd);
        if(cmd.trim()!==''){ LAB.hist.push(cmd); }
        LAB.hi=LAB.hist.length;
        var res=LAB.dev.exec(cmd);
        res.forEach(function(l){ labWrite(scroll,l.cls,l.t); });
        input.value='';
        refresh();
        scroll.scrollTop=scroll.scrollHeight;
      } else if(e.key==='ArrowUp'){
        e.preventDefault();
        if(LAB.hi>0){ LAB.hi--; input.value=LAB.hist[LAB.hi]||''; }
      } else if(e.key==='ArrowDown'){
        e.preventDefault();
        if(LAB.hi<LAB.hist.length-1){ LAB.hi++; input.value=LAB.hist[LAB.hi]||''; }
        else { LAB.hi=LAB.hist.length; input.value=''; }
      }
    });
    main.querySelector('[data-labclear]').addEventListener('click',function(){scroll.innerHTML=''; input.focus();});
    main.querySelector('[data-labreset]').addEventListener('click',function(){
      LAB.dev=cfg.make(); LAB.hist=[]; LAB.hi=-1; scroll.innerHTML='';
      labWrite(scroll,'info',LAB.cert==='linuxplus'?'  Shell reset. Virtual filesystem and state cleared.':(LAB.cert==='itil5'?'  Session reset. Virtual backlog and auth state cleared.':(LAB.cert==='securityx'?'  Console reset. State cleared.':'  Device reset. All configuration cleared.'))); labWrite(scroll,'out','');
      refresh(); input.focus();
    });

    main.querySelector('.console').addEventListener('click',function(e){ if(!e.target.closest('button')) input.focus(); });

  function runScript(text, rep){
    var cfg=labCfg(LAB.cert);
    var dev=cfg.make();
    var commentCh=cfg.comment;
    var lines=text.split(/\r?\n/);
    var okC=0, errC=0, infoC=0, execC=0;
    var rows='';
    lines.forEach(function(raw,idx){
      var t=raw.trim();
      var promptStr=dev.prompt();
      if(t===''){ return; }                 // skip blank lines in the report
      if(t[0]===commentCh){                  // comment
        rows+='<div class="rline i"><span class="rn">'+(idx+1)+'</span><span class="rc"><span class="rcmd">'+esc(raw)+'</span>'
          +'<span class="rmsg">comment \u2014 skipped</span></span><span class="status">\u2014</span></div>';
        infoC++; return;
      }
      execC++;
      var res=dev.exec(raw);
      var hasErr=res.some(function(l){return l.cls==='err';});
      var msgs=res.map(function(l){return l.t;}).filter(function(x){return x!=='';});
      var cls = hasErr? 'e' : 'g';
      var status = hasErr? '\u2717 ERROR' : '\u2713 OK';
      var msgHtml='';
      if(msgs.length){ msgHtml='<span class="rmsg">'+esc(msgs.join('\n'))+'</span>'; }
      else if(!hasErr){ msgHtml='<span class="rmsg" style="color:var(--faint)">accepted (prompt \u2192 '+esc(dev.prompt())+')</span>'; }
      rows+='<div class="rline '+cls+'"><span class="rn">'+(idx+1)+'</span>'
        +'<span class="rc"><span class="cp" style="color:var(--primary)">'+esc(promptStr)+'</span> <span class="rcmd">'+esc(t)+'</span>'
        +msgHtml+'</span><span class="status">'+status+'</span></div>';
      if(hasErr) errC++; else okC++;
    });
    if(execC===0){ rep.innerHTML='<div class="report-empty">No commands to run. Paste a configuration and try again.</div>'; return; }
    var verdict = errC===0
      ? '<span class="pill ok">\u2713 All '+okC+' commands succeeded</span>'
      : '<span class="pill bad">\u2717 '+errC+' error'+(errC>1?'s':'')+'</span><span class="pill ok">'+okC+' OK</span>';
    if(infoC) verdict+='<span class="pill neutral">'+infoC+' comment'+(infoC>1?'s':'')+'</span>';
    rep.innerHTML='<div class="report-head">'+verdict+'</div><div class="report-body">'+rows+'</div>';
  }

  // ---- Script Samples library (100 examples) ----
  var PENDING_SAMPLE=null; // config text handed off to the validator
  function ssHighlight(cfg, commentCh){
    commentCh=commentCh||'!';
    return cfg.map(function(line){
      if(line.trim()[0]===commentCh) return '<span class="cm">'+esc(line)+'</span>';
      var m=line.match(/^(\s*)(\S+)([\s\S]*)$/);
      if(!m) return esc(line);
      return esc(m[1])+'<span class="ck">'+esc(m[2])+'</span>'+esc(m[3]);
    }).join('\n');
  }
  function ssExplain(txt){
    if(!txt) return '';
    // split on the labels: WHY IT WORKS / WHY A VARIANT FAILS / WHY IT MATTERS
    var parts=txt.split(/(?=WHY (?:IT WORKS|A VARIANT FAILS|IT MATTERS):)/);
    var rows=parts.map(function(p){
      var m=p.match(/^(WHY (?:IT WORKS|A VARIANT FAILS|IT MATTERS)):\s*([\s\S]*)$/);
      if(!m) return '';
      var label=m[1], body=m[2].trim();
      var cls = label==='WHY IT WORKS' ? 'ok' : (label==='WHY A VARIANT FAILS' ? 'bad' : 'note');
      var nice = label==='WHY IT WORKS' ? 'Why it works' : (label==='WHY A VARIANT FAILS' ? 'Why a common variant fails' : 'Why it matters');
      return '<div class="ss-ex-row '+cls+'"><span class="ss-ex-tag">'+nice+'</span>'
           + '<span class="ss-ex-txt">'+esc(body)+'</span></div>';
    }).join('');
    return '<div class="ss-explain">'+rows+'</div>';
  }
  function renderScriptSamples(cert){
    var c=META.filter(function(x){return x.id===cert;})[0];
    var cfg=labCfg(cert);
    var all=cfg.lib();
    var commentCh=cfg.comment;

      +'<div class="phead"><span class="book-badge">'+cfg.ssBadge+'</span>'

        +'<input class="ss-search" id="ssSearch" placeholder="'+esc(cfg.ssSearchPh)+'">'
        +'<div class="ss-filters">'+chips+'</div>'
        +'<span class="ss-count" id="ssCount"></span></div>'
      +'<div class="ss-list" id="ssList"></div>';

    var listEl=main.querySelector('#ssList');
    var countEl=main.querySelector('#ssCount');
    var searchEl=main.querySelector('#ssSearch');
    var curLvl='All', curQ='';

    function matches(s){
      if(curLvl!=='All' && s.level!==curLvl) return false;
      if(!curQ) return true;
      var hay=(s.title+' '+s.cat+' '+s.level+' '+s.purpose+' '+s.config.join(' ')).toLowerCase();
      return hay.indexOf(curQ)!==-1;
    }
    function draw(){
      var shown=all.filter(matches);
      countEl.textContent=shown.length+' of '+all.length;
      if(!shown.length){ listEl.innerHTML='<div class="ss-empty">No examples match your search.</div>'; return; }
      listEl.innerHTML=shown.map(function(s){
        return '<div class="ss-card" data-card="'+s.id+'">'
          +'<div class="ss-card-head" data-cardhead="'+s.id+'">'
            +'<span class="ss-idx">#'+s.id+'</span>'
            +'<span class="ss-meta"><span class="ss-title">'+esc(s.title)+'</span>'
              +'<span class="ss-purpose">'+esc(s.purpose)+'</span></span>'
            +'<span class="ss-tags"><span class="ss-lvl '+s.level+'">'+s.level+'</span>'
              +'<span class="ss-cat">'+esc(s.cat)+'</span></span></div>'
          +'<div class="ss-body">'
            +'<pre class="ss-code">'+ssHighlight(s.config, commentCh)+'</pre>'
            +ssExplain(s.explain)
            +'<div class="ss-actions">'
              +'<button class="lab-btn" data-copy="'+s.id+'">Copy config</button>'
              +'<button class="lab-btn primary" data-send="'+s.id+'">Send to validator \u2192</button>'
            +'</div>'
          +'</div></div>';
      }).join('');
    }
    draw();

    // expand/collapse
    listEl.addEventListener('click',function(e){
      var head=e.target.closest('[data-cardhead]');
      if(head && !e.target.closest('button')){
        head.parentElement.classList.toggle('open'); return;
      }
      var cp=e.target.closest('[data-copy]');
      if(cp){
        var s1=all.filter(function(x){return x.id==cp.getAttribute('data-copy');})[0];
        var txt=s1.config.join('\n');
        var done=function(){var o=cp.textContent;cp.textContent='\u2713 Copied';cp.classList.add('ss-copied');setTimeout(function(){cp.textContent=o;cp.classList.remove('ss-copied');},1400);};
        if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done,done);}
        else{var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(_){}document.body.removeChild(ta);done();}
        return;
      }
      var sd=e.target.closest('[data-send]');
      if(sd){
        var s2=all.filter(function(x){return x.id==sd.getAttribute('data-send');})[0];
        PENDING_SAMPLE=s2.config.join('\n');
        location.hash='#/'+cert+'/terminal';
        return;
      }
    });
    // filters
    main.querySelectorAll('[data-lvl]').forEach(function(b){
      b.addEventListener('click',function(){
        curLvl=b.getAttribute('data-lvl');
        main.querySelectorAll('[data-lvl]').forEach(function(x){x.classList.toggle('active',x===b);});
        draw();
      });
    });
    searchEl.addEventListener('input',function(){ curQ=searchEl.value.trim().toLowerCase(); draw(); });
  }

  // ---- Routing ----
  function parseHash(){
    var raw=(location.hash||'#/').replace(/^#\/?/,'');
    var qi=raw.indexOf('?'), query='';
    if(qi>=0){
      var qs=raw.slice(qi+1); raw=raw.slice(0,qi);
      var qm=qs.match(/(?:^|&)q=([^&]*)/);
      if(qm){try{query=decodeURIComponent(qm[1].replace(/\+/g,' '));}catch(e){query=qm[1];}}
    }
    var m=raw;
    var parts=m.split('/').filter(Boolean);
    if(parts[0]==='search') return {view:'search',query:query};
    if(!parts.length) return {view:'home'};
    var cert=parts[0];
    if(!DATA[cert]) return {view:'home'};
    if(parts[1]&&/^set-\d+$/.test(parts[1])) return {view:'set',cert:cert,page:parseInt(parts[1].slice(4),10),query:query};
    if(parts[1]==='domains') return {view:'domains',cert:cert};
    if(parts[1]&&/^domain-\d+$/.test(parts[1])){
      var dpage=1;
      if(parts[2]&&/^p-\d+$/.test(parts[2])) dpage=parseInt(parts[2].slice(2),10);
      return {view:'domain',cert:cert,dom:parseInt(parts[1].slice(7),10),page:dpage,query:query};
    }
    if(parts[1]==='terminal') return {view:'terminal',cert:cert};
    if(parts[1]==='samples') return {view:'samples',cert:cert};
    if(parts[1]==='labs'){
      if(parts[2]&&/^lab-\d+$/.test(parts[2])) return {view:'lab',cert:cert,lab:parseInt(parts[2].slice(4),10)};
      return {view:'labs',cert:cert};
    }
    if(parts[1]==='book'){
      if(parts[2]&&/^ch-\d+$/.test(parts[2])) return {view:'chapter',cert:cert,ch:parseInt(parts[2].slice(3),10)};
      return {view:'book',cert:cert};
    }
    return {view:'cert',cert:cert};
  }

  // ---- Global search across all certification question banks ----
  function certName(id){var c=META.filter(function(x){return x.id===id;})[0];return c?c.name:id;}
  function hl(text,terms){
    var out=esc(text);
    terms.forEach(function(t){
      if(!t)return;
      var re=new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
      out=out.replace(re,'\u0001$1\u0002');
    });
    return out.replace(/\u0001/g,'<mark>').replace(/\u0002/g,'</mark>');
  }
  // flatten a book chapter's blocks into one searchable text string
  function blockText(b){
    if(!b) return '';
    if(typeof b==='string') return b;
    var t=[];
    if(b.text) t.push(b.text);
    if(b.title) t.push(b.title);
    if(b.items&&b.items.join) t.push(b.items.join(' '));
    if(b.headers&&b.headers.join) t.push(b.headers.join(' '));
    if(b.rows&&b.rows.length){ for(var r=0;r<b.rows.length;r++){ var row=b.rows[r]; t.push(row&&row.join?row.join(' '):String(row)); } }
    if(b.code) t.push(b.code);
    return t.join(' ');
  }

  function renderSearch(query){
    query=(query||'').trim();
    var h='<div class="crumbs"><a href="#/">Home</a> / Search</div>';
    if(query.length<2){
      h+='<div class="phead"><h1>Search</h1><p class="psub">Type at least 2 characters to search every question, study book, and performance lab across all certifications.</p></div>';
      main.innerHTML=h; return;
    }
    var terms=query.toLowerCase().split(/\s+/).filter(Boolean);
    function matchAll(hay){ for(var ti=0;ti<terms.length;ti++){ if(hay.indexOf(terms[ti])<0) return false; } return true; }
    var QCAP=250, BCAP=120, PCAP=120;

    // 1) Questions (exam bank)
    var qhits=[];
    for(var ci=0; ci<META.length && qhits.length<QCAP; ci++){
      var id=META[ci].id, bank=DATA[id]; if(!bank)continue;
      for(var qi=0; qi<bank.length; qi++){
        var q=bank[qi];
        var hay=(q.q+' '+(q.options?q.options.join(' '):'')+' '+(q.explanation||'')).toLowerCase();
        if(matchAll(hay)){
          var n=qi+1, page=Math.floor(qi/PAGE)+1;
          qhits.push({cert:id,cname:certName(id),n:n,page:page,q:q});
          if(qhits.length>=QCAP)break;
        }
      }
    }

    // 2) Study books (chapters + blocks)
    var bhits=[];
    for(var bi=0; bi<META.length && bhits.length<BCAP; bi++){
      var bid=META[bi].id, book=BOOKS[bid]; if(!book||!book.chapters)continue;
      for(var chi=0; chi<book.chapters.length; chi++){
        var ch=book.chapters[chi];
        var parts=[ch.title||'', ch.summary||''];
        if(ch.blocks){ for(var k=0;k<ch.blocks.length;k++){ parts.push(blockText(ch.blocks[k])); } }
        var chay=parts.join(' ').toLowerCase();
        if(matchAll(chay)){
          // find a short matching snippet for context
          var snip=ch.summary||'';
          if(ch.blocks){ for(var s=0;s<ch.blocks.length;s++){ var bt=blockText(ch.blocks[s]); if(bt&&matchAll(bt.toLowerCase())){ snip=bt; break; } } }
          bhits.push({cert:bid,cname:certName(bid),num:ch.num,title:ch.title||('Chapter '+ch.num),snip:snip});
          if(bhits.length>=BCAP)break;
        }
      }
    }

    // 3) Performance labs (PBQs)
    var phits=[];
    for(var pi=0; pi<META.length && phits.length<PCAP; pi++){
      var pid=META[pi].id, pbank=PBQS[pid]; if(!pbank)continue;
      for(var li=0; li<pbank.length; li++){
        var pb=pbank[li];
        var opts=pb.options?pb.options.join(' '):'';
        var phay=((pb.title||'')+' '+(pb.scenario||'')+' '+(pb.question||'')+' '+(pb.cli||'')+' '+opts+' '+(pb.explanation||'')+' '+(pb.domain||'')).toLowerCase();
        if(matchAll(phay)){
          phits.push({cert:pid,cname:certName(pid),idx:li,title:pb.title||('Lab '+(li+1)),domain:pb.domain||'',kind:pb.type||''});
          if(phits.length>=PCAP)break;
        }
      }
    }

    var total=qhits.length+bhits.length+phits.length;
    h+='<div class="phead"><h1>Search results</h1><p class="psub">'+total+' result'+(total===1?'':'s')+' for \u201c'+esc(query)+'\u201d across questions, study books, and performance labs</p></div>';
    if(!total){
      h+='<div class="sr-empty">Nothing matched \u201c'+esc(query)+'\u201d. Try different or fewer words.</div>';
      main.innerHTML=h; return;
    }

    // Questions section
    if(qhits.length){
      h+='<h2 class="sr-sec">Questions <span class="sr-sec-n">'+qhits.length+(qhits.length>=QCAP?'+':'')+'</span></h2><div class="sresults">';
      qhits.forEach(function(r){
        var ans=(r.q.options&&r.q.options[r.q.answer]!=null)?r.q.options[r.q.answer]:'';
        h+='<a class="sr-item" href="#/'+r.cert+'/set-'+r.page+'?q='+r.n+'">'
          +'<div class="sr-meta"><span class="sr-cert">'+esc(r.cname)+'</span><span>\u00b7</span><span>Set '+r.page+'</span><span>\u00b7</span><span>Question '+r.n+'</span></div>'
          +'<div class="sr-q">'+hl(r.q.q,terms)+'</div>'
          +(ans?'<div class="sr-ans">Answer: '+letter(r.q.answer)+'. '+hl(ans,terms)+'</div>':'')
          +'</a>';
      });
      h+='</div>';
    }

    // Study books section
    if(bhits.length){
      h+='<h2 class="sr-sec">Study books <span class="sr-sec-n">'+bhits.length+(bhits.length>=BCAP?'+':'')+'</span></h2><div class="sresults">';
      bhits.forEach(function(r){
        var sn=r.snip||''; if(sn.length>240) sn=sn.slice(0,240)+'\u2026';
        h+='<a class="sr-item" href="#/'+r.cert+'/book/ch-'+r.num+'">'
          +'<div class="sr-meta"><span class="sr-cert">'+esc(r.cname)+'</span><span>\u00b7</span><span>Study book</span><span>\u00b7</span><span>Chapter '+r.num+'</span></div>'
          +'<div class="sr-q">'+hl(r.title,terms)+'</div>'
          +(sn?'<div class="sr-ans">'+hl(sn,terms)+'</div>':'')
          +'</a>';
      });
      h+='</div>';
    }

    // Performance labs section
    if(phits.length){
      var kindLabel={match:'Drag & match',order:'Drag to order',categorize:'Drag to categorize',fillin:'Fill in',exhibit:'Refer to exhibit'};
      h+='<h2 class="sr-sec">Performance labs <span class="sr-sec-n">'+phits.length+(phits.length>=PCAP?'+':'')+'</span></h2><div class="sresults">';
      phits.forEach(function(r){
        h+='<a class="sr-item" href="#/'+r.cert+'/labs/lab-'+r.idx+'">'
          +'<div class="sr-meta"><span class="sr-cert">'+esc(r.cname)+'</span><span>\u00b7</span><span>Performance lab</span><span>\u00b7</span><span>Lab '+(r.idx+1)+'</span>'
          +(r.kind?'<span>\u00b7</span><span>'+esc(kindLabel[r.kind]||r.kind)+'</span>':'')+'</div>'
          +'<div class="sr-q">'+hl(r.title,terms)+'</div>'
          +(r.domain?'<div class="sr-ans">'+hl(r.domain,terms)+'</div>':'')
          +'</a>';
      });
      h+='</div>';
    }
    main.innerHTML=h;
  }

  // ---- Performance-Based Questions (interactive labs) ----
  function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
  function normAns(s){return (s||'').toString().trim().toLowerCase().replace(/\s+/g,' ');}
  function tokEl(text,payload){
    var d=document.createElement('div');d.className='tok';d.draggable=true;
    d.setAttribute('data-val',payload);
    d.innerHTML='<span class="grip">\u2807</span><span class="tok-t"></span>';
    d.querySelector('.tok-t').textContent=text;
    d.addEventListener('dragstart',function(e){d.classList.add('dragging');dragEl=d;try{e.dataTransfer.setData('text/plain',payload);}catch(_){}}); 
    d.addEventListener('dragend',function(){d.classList.remove('dragging');dragEl=null;});
    return d;
  }
  var dragEl=null;
  function wireDrop(zone){
    zone.addEventListener('dragover',function(e){e.preventDefault();zone.classList.add('over');});
    zone.addEventListener('dragleave',function(){zone.classList.remove('over');});
    zone.addEventListener('drop',function(e){
      e.preventDefault();zone.classList.remove('over');
      if(!dragEl)return;
      var ph=zone.querySelector('.ph'); if(ph)ph.remove();
      zone.appendChild(dragEl);
      // if this is a single-slot match drop, bump any existing token back to the pool
      if(zone.getAttribute('data-single')==='1'){
        var pool=zone.closest('.pbq').querySelector('.pbq-pool');
        zone.querySelectorAll('.tok').forEach(function(t){if(t!==dragEl&&pool)pool.appendChild(t);});
      }
      refreshPools(zone.closest('.pbq'));
    });
  }
  function refreshPools(pbq){
    pbq.querySelectorAll('.pbq-pool').forEach(function(p){p.classList.toggle('empty',!p.querySelector('.tok'));});
    pbq.querySelectorAll('.drop').forEach(function(z){
      if(z.getAttribute('data-single')==='1'&&!z.querySelector('.tok')&&!z.querySelector('.ph')){
        var ph=document.createElement('span');ph.className='ph';ph.textContent='Drop here';z.appendChild(ph);
      }
    });
  }

  // Labs INDEX: a clickable grid so users jump straight to one scenario (no infinite scroll)

    h+=(labIdx<bank.length-1?'<a class="lab-nav-b" href="#/'+cert+'/labs/lab-'+(labIdx+1)+'">Next \u203a</a>':'<span class="lab-nav-b disabled">Next \u203a</span>');
