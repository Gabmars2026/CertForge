  function buildPBQ(p,idx){
    var el=document.createElement('article');el.className='pbq';el.setAttribute('data-type',p.type);
    var kindLabel={match:'Drag & match',order:'Drag to order',categorize:'Drag to categorize',fillin:'Fill in',exhibit:'Refer to exhibit'}[p.type]||'Task';
    var head='<div class="pbq-head"><div class="pbq-tag"><span>PBQ '+(idx+1)+'</span><span class="kind">'+kindLabel+'</span><span>'+esc(p.domain||'')+'</span></div>'
      +'<h3></h3><div class="pbq-scn"></div></div>';
    el.innerHTML=head;
    el.querySelector('h3').textContent=p.title||'';
    el.querySelector('.pbq-scn').textContent=p.scenario||'';
    var body=document.createElement('div');

    if(p.type==='exhibit'){
      var ex=document.createElement('div');ex.className='pbq-exhibit';
      var cap=document.createElement('div');cap.className='ex-cap';cap.textContent='Exhibit';ex.appendChild(cap);
      if(p.svg){var sw=document.createElement('div');sw.innerHTML=p.svg;var svgEl=sw.querySelector('svg');if(svgEl){svgEl.classList.add('pbq-topo');ex.appendChild(svgEl);}}
      if(p.cli){var pre=document.createElement('pre');pre.className='pbq-cli';pre.textContent=p.cli;ex.appendChild(pre);}
      body.appendChild(ex);
      var qt=document.createElement('div');qt.className='pbq-qtext';qt.textContent=p.question||'';body.appendChild(qt);
      var opts=document.createElement('div');opts.className='pbq-opts';
      var order=shuffle(p.options.map(function(o,i){return i;}));
      order.forEach(function(i){
        var b=document.createElement('button');b.className='pbq-opt';b.setAttribute('data-oi',String(i));b.type='button';
        var lt=document.createElement('span');lt.className='lt';lt.textContent=String.fromCharCode(65+opts.children.length)+'.';
        var tx=document.createElement('span');tx.textContent=p.options[i];
        b.appendChild(lt);b.appendChild(tx);
        b.addEventListener('click',function(){
          if(el.classList.contains('graded'))return;
          opts.querySelectorAll('.pbq-opt').forEach(function(o){o.classList.remove('sel');});
          b.classList.add('sel');
        });
        opts.appendChild(b);
      });
      body.appendChild(opts);
    } else if(p.type==='match'){
      // pool of right-side answers, each left label has a single drop slot
      var pool=document.createElement('div');pool.className='pbq-pool';
      shuffle(p.pairs.map(function(pr,i){return i;})).forEach(function(i){pool.appendChild(tokEl(p.pairs[i].right,String(i)));});
      var grid=document.createElement('div');grid.className='pbq-grid';
      p.pairs.forEach(function(pr,i){
        var row=document.createElement('div');row.className='pbq-match-row';
        var lbl=document.createElement('div');lbl.className='pbq-match-lbl';lbl.textContent=pr.left;
        var drop=document.createElement('div');drop.className='drop';drop.setAttribute('data-single','1');drop.setAttribute('data-idx',String(i));
        var ph=document.createElement('span');ph.className='ph';ph.textContent='Drop match here';drop.appendChild(ph);
        wireDrop(drop);row.appendChild(lbl);row.appendChild(drop);grid.appendChild(row);
      });
      body.appendChild(pool);body.appendChild(grid);
    } else if(p.type==='categorize'){
      var pool2=document.createElement('div');pool2.className='pbq-pool';
      shuffle(p.items.map(function(it,i){return i;})).forEach(function(i){pool2.appendChild(tokEl(p.items[i].text,String(i)));});
      var grid2=document.createElement('div');grid2.className='pbq-grid';
      p.buckets.forEach(function(bn){
        var b=document.createElement('div');b.className='bucket';
        var hd=document.createElement('div');hd.className='bucket-h';hd.textContent=bn;
        var drop=document.createElement('div');drop.className='drop';drop.setAttribute('data-bucket',bn);
        wireDrop(drop);b.appendChild(hd);b.appendChild(drop);grid2.appendChild(b);
      });
      body.appendChild(pool2);body.appendChild(grid2);
    } else if(p.type==='order'){
      var ul=document.createElement('ul');ul.className='pbq-seq';
      var order=shuffle(p.items.map(function(it,i){return i;}));
      // avoid an accidental already-correct shuffle
      if(order.every(function(v,i){return v===i;})&&order.length>1){var t=order[0];order[0]=order[1];order[1]=t;}
      order.forEach(function(i){
        var li=document.createElement('li');li.setAttribute('data-idx',String(i));li.draggable=true;
        var sp=document.createElement('span');sp.className='seq-t';sp.textContent=p.items[i];
        li.appendChild(sp);var g=document.createElement('span');g.className='grip';g.textContent='\u2807';li.appendChild(g);
        li.addEventListener('dragstart',function(){li.classList.add('dragging');});
        li.addEventListener('dragend',function(){li.classList.remove('dragging');});
        ul.appendChild(li);
      });
      ul.addEventListener('dragover',function(e){
        e.preventDefault();
        var d=ul.querySelector('.dragging');if(!d)return;
        var after=seqAfter(ul,e.clientY);
        if(after==null)ul.appendChild(d);else ul.insertBefore(d,after);
      });
      body.appendChild(ul);
    } else if(p.type==='fillin'){
      var fl=document.createElement('div');fl.className='pbq-fill';
      p.blanks.forEach(function(bl,i){
        var lab=document.createElement('label');
        var span=document.createElement('span');span.textContent=bl.label;
        var inp=document.createElement('input');inp.type='text';inp.setAttribute('data-idx',String(i));inp.autocomplete='off';inp.spellcheck=false;
        lab.appendChild(span);lab.appendChild(inp);fl.appendChild(lab);
      });
      body.appendChild(fl);
    }
    el.appendChild(body);

    var actions=document.createElement('div');actions.className='pbq-actions';
    actions.innerHTML='<button class="pbq-btn primary" data-check>Check answers</button>'
      +'<button class="pbq-btn" data-reset>Reset</button><span class="pbq-score" data-score></span>';
    el.appendChild(actions);
    var expl=document.createElement('div');expl.className='pbq-expl';
    expl.innerHTML='<strong>Explanation.</strong> ';var es=document.createElement('span');es.textContent=p.explanation||'';expl.appendChild(es);
    el.appendChild(expl);

    actions.querySelector('[data-check]').addEventListener('click',function(){gradePBQ(el,p);});
    actions.querySelector('[data-reset]').addEventListener('click',function(){el.replaceWith(buildPBQ(p,idx));});
    refreshPools(el);
    return el;
  }
  function seqAfter(ul,y){
    var els=[].slice.call(ul.querySelectorAll('li:not(.dragging)'));
    var closest=null,cd=-Infinity;
    els.forEach(function(c){var box=c.getBoundingClientRect();var off=y-box.top-box.height/2;
      if(off<0&&off>cd){cd=off;closest=c;}});
    return closest;
  }
  function gradePBQ(el,p){
    var correct=0,total=0;
    el.querySelectorAll('.right,.wrong').forEach(function(n){n.classList.remove('right','wrong');});
    if(p.type==='exhibit'){
      total=1;
      var sel=el.querySelector('.pbq-opt.sel');
      el.querySelectorAll('.pbq-opt').forEach(function(o){
        var oi=parseInt(o.getAttribute('data-oi'),10);
        if(oi===p.answer)o.classList.add('right');
        else if(o===sel)o.classList.add('wrong');
      });
      if(sel&&parseInt(sel.getAttribute('data-oi'),10)===p.answer)correct=1;
    } else if(p.type==='match'){
      el.querySelectorAll('.drop').forEach(function(z){
        total++;var tok=z.querySelector('.tok');
        var ok=tok&&tok.getAttribute('data-val')===z.getAttribute('data-idx');
        z.classList.add(ok?'right':'wrong');if(tok)tok.classList.add(ok?'right':'wrong');if(ok)correct++;
      });
    } else if(p.type==='categorize'){
      el.querySelectorAll('.drop').forEach(function(z){
        var bn=z.getAttribute('data-bucket');
        z.querySelectorAll('.tok').forEach(function(tok){
          total++;var i=parseInt(tok.getAttribute('data-val'),10);
          var ok=p.items[i].bucket===bn;tok.classList.add(ok?'right':'wrong');if(ok)correct++;
        });
      });
      // items still in the pool count as unplaced/incorrect
      el.querySelectorAll('.pbq-pool .tok').forEach(function(tok){total++;tok.classList.add('wrong');});
    } else if(p.type==='order'){
      var lis=[].slice.call(el.querySelectorAll('.pbq-seq li'));
      lis.forEach(function(li,pos){total++;var ok=parseInt(li.getAttribute('data-idx'),10)===pos;
        li.classList.add(ok?'right':'wrong');if(ok)correct++;});
    } else if(p.type==='fillin'){
      el.querySelectorAll('.pbq-fill input').forEach(function(inp){
        total++;var i=parseInt(inp.getAttribute('data-idx'),10);var bl=p.blanks[i];
        var val=normAns(inp.value);var acc=(bl.accept||[bl.answer]).map(normAns);
        var ok=acc.indexOf(val)>=0;inp.classList.add(ok?'right':'wrong');if(ok)correct++;
      });
    }
    var sc=el.querySelector('[data-score]');var pct=total?Math.round(correct/total*100):0;
    sc.textContent=correct+'/'+total+' correct \u00b7 '+pct+'%';
    sc.className='pbq-score '+(correct===total?'pass':'fail');
    el.classList.add('graded');
  }

  function renderSet(cert,page,query){
    var c=META.filter(function(x){return x.id===cert;})[0];
    var bank=DATA[cert], total=sets(c.count);
    page=Math.min(Math.max(1,page),total);
    var start=(page-1)*PAGE, slice=bank.slice(start,start+PAGE);
    var h='<div class="crumbs"><a href="#/">Home</a> / <a href="#/'+cert+'">'+esc(c.name)+'</a> / Set '+page+'</div>';
    h+='<div class="phead"><h1>'+esc(c.name)+' \u2014 Set '+page+'</h1>'
      +'<p class="psub">Question set '+page+' of '+total+' \u00b7 Questions '+(start+1)+'\u2013'+(start+slice.length)+' of '+c.count+'</p></div>';
    slice.forEach(function(q,idx){
      var n=start+idx+1;
      h+='<article class="qcard" data-answer="'+q.answer+'" data-qn="'+n+'"><div class="qnum">QUESTION '+n+'</div>'
        +'<div class="qtext">'+esc(q.q)+'</div><div class="opts">';
      q.options.forEach(function(opt,oi){
        h+='<button class="opt" data-oi="'+oi+'"><span class="lt">'+letter(oi)+'</span><span>'+esc(opt)+'</span></button>';
      });
      h+='</div><button class="reveal" data-reveal>SHOW ANSWER</button>'
        +'<div class="explain"><strong>Answer: '+letter(q.answer)+'.</strong> '+esc(q.explanation||'')+'</div></article>';
    });
    h+=pagerHtml(cert,page,total);
    main.innerHTML=h;
    main.querySelectorAll('.qcard').forEach(function(card){
      var ans=parseInt(card.getAttribute('data-answer'),10);
      card.querySelectorAll('.opt').forEach(function(btn){
        btn.addEventListener('click',function(){
          if(card.classList.contains('answered'))return;
          card.classList.add('answered');
          var chosen=parseInt(btn.getAttribute('data-oi'),10);
          card.querySelectorAll('.opt').forEach(function(b2,oi){
            if(oi===ans)b2.classList.add('correct');else if(oi===chosen)b2.classList.add('incorrect');
          });
        });
      });
      var rev=card.querySelector('[data-reveal]');
      rev.addEventListener('click',function(){
        if(card.classList.contains('answered'))return;
        card.classList.add('answered');
        card.querySelectorAll('.opt').forEach(function(b2,oi){if(oi===ans)b2.classList.add('correct');});
      });
    });
    // If arriving from a search hit, highlight and scroll to that question
    if(query){
      var qn=parseInt(query,10);
      if(qn){
        var target=main.querySelector('.qcard[data-qn="'+qn+'"]');
        if(target){
          target.classList.add('qhit');
          setTimeout(function(){target.scrollIntoView({block:'center',behavior:'smooth'});},60);
        }
      }
    }
  }

  // ---- Shared: wire answer/reveal behavior on rendered .qcard elements ----
  function wireQuizCards(scopeEl){
    scopeEl.querySelectorAll('.qcard').forEach(function(card){
      var ans=parseInt(card.getAttribute('data-answer'),10);
      card.querySelectorAll('.opt').forEach(function(btn){
        btn.addEventListener('click',function(){
          if(card.classList.contains('answered'))return;
          card.classList.add('answered');
          var chosen=parseInt(btn.getAttribute('data-oi'),10);
          card.querySelectorAll('.opt').forEach(function(b2,oi){
            if(oi===ans)b2.classList.add('correct');else if(oi===chosen)b2.classList.add('incorrect');
          });
        });
      });
      var rev=card.querySelector('[data-reveal]');
      if(rev)rev.addEventListener('click',function(){
        if(card.classList.contains('answered'))return;
        card.classList.add('answered');
        card.querySelectorAll('.opt').forEach(function(b2,oi){if(oi===ans)b2.classList.add('correct');});
      });
    });
  }
  // Build one question card. n = 1-based global question number shown to the user.
  function qcardHtml(q,n){
    var h='<article class="qcard" data-answer="'+q.answer+'" data-qn="'+n+'"><div class="qnum">QUESTION '+n+'</div>'
      +'<div class="qtext">'+esc(q.q)+'</div><div class="opts">';
    q.options.forEach(function(opt,oi){
      h+='<button class="opt" data-oi="'+oi+'"><span class="lt">'+letter(oi)+'</span><span>'+esc(opt)+'</span></button>';
    });
    h+='</div><button class="reveal" data-reveal>SHOW ANSWER</button>'
      +'<div class="explain"><strong>Answer: '+letter(q.answer)+'.</strong> '+esc(q.explanation||'')+'</div></article>';
    return h;
  }

  // ---- Domain index: clickable cards, one per exam domain (like Performance Labs) ----
  function renderDomainIndex(cert){
    var c=META.filter(function(x){return x.id===cert;})[0];
    var groups=domainGroups(cert);
    if(!groups){renderCert(cert);return;}
    var cards=groups.map(function(g,i){
      return '<a class="lab-card" href="#/'+cert+'/domain-'+i+'">'
        +'<span class="lab-card-no">Domain '+(i+1)+'</span>'
        +'<span class="lab-card-title">'+esc(g.name)+'</span>'
        +'<span class="lab-card-kind">'+g.qs.length+' question'+(g.qs.length===1?'':'s')+' \u2192</span></a>';
    }).join('');
    main.innerHTML='<div class="crumbs"><a href="#/">Home</a> / <a href="#/'+cert+'">'+esc(c.name)+'</a> / Questions by Domain</div>'
      +'<div class="phead"><h1>'+esc(c.name)+' \u2014 Questions by Domain</h1>'
      +'<p class="psub">'+c.count.toLocaleString()+' practice questions organized into '+groups.length+' exam domains \u00b7 click a domain to study just those questions</p></div>'
      +'<div class="dom-note">Questions are auto-sorted into each certification\u2019s official exam domains by topic keywords \u2014 a study-navigation aid, not an official '+esc(c.code)+' objective mapping. A small number may land in \u201cGeneral / Mixed.\u201d</div>'
      +'<div class="lab-index"><div class="lab-set"><div class="lab-cards">'+cards+'</div></div></div>';
  }

  // ---- Domain quiz: all questions in one domain, paginated in blocks of PAGE ----
  function renderDomainQuiz(cert,dom,page,query){
    var c=META.filter(function(x){return x.id===cert;})[0];
    var groups=domainGroups(cert);
    if(!groups||dom<0||dom>=groups.length){renderCert(cert);return;}
    var g=groups[dom], bank=DATA[cert];
    var totalQ=g.qs.length, totalP=Math.max(1,Math.ceil(totalQ/PAGE));
    page=Math.min(Math.max(1,page),totalP);
    var start=(page-1)*PAGE, slice=g.qs.slice(start,start+PAGE);
    function navbar(bottom){
      var prev=(page>1?'<a class="lab-nav-b" href="#/'+cert+'/domain-'+dom+'/p-'+(page-1)+'">\u2039 Prev</a>':'<span class="lab-nav-b disabled">\u2039 Prev</span>');
      var next=(page<totalP?'<a class="lab-nav-b" href="#/'+cert+'/domain-'+dom+'/p-'+(page+1)+'">Next \u203a</a>':'<span class="lab-nav-b disabled">Next \u203a</span>');
      return '<div class="lab-navbar'+(bottom?' lab-navbar-bottom':'')+'"><a class="lab-back" href="#/'+cert+'/domains">\u2039 All domains</a>'
        +'<span class="lab-pos">Domain '+(dom+1)+' of '+groups.length+(totalP>1?' \u00b7 page '+page+'/'+totalP:'')+'</span>'
        +'<span class="lab-nav-btns">'+prev+next+'</span></div>';
    }
    var h='<div class="crumbs"><a href="#/">Home</a> / <a href="#/'+cert+'">'+esc(c.name)+'</a> / <a href="#/'+cert+'/domains">Domains</a> / '+esc(g.name)+'</div>';
    h+=navbar(false);
    h+='<div class="phead"><h1>'+esc(g.name)+'</h1>'
      +'<p class="psub">'+esc(c.name)+' \u00b7 '+totalQ+' question'+(totalQ===1?'':'s')+' in this domain'
      +(totalP>1?' \u00b7 showing '+(start+1)+'\u2013'+(start+slice.length):'')+'</p></div>';
    slice.forEach(function(qi){ h+=qcardHtml(bank[qi], qi+1); });
    h+=navbar(true);
    main.innerHTML=h;
    wireQuizCards(main);
    if(query){
      var qn=parseInt(query,10);
      if(qn){var target=main.querySelector('.qcard[data-qn="'+qn+'"]');if(target){target.classList.add('qhit');setTimeout(function(){target.scrollIntoView({block:'center',behavior:'smooth'});},60);}}
    }
  }

  // ---- Study Book rendering ----
  function renderTermLine(ln){
    if(ln.kind==='prompt'){
      var usr=ln.user||'', host=ln.host||'', cwd=ln.cwd||'', head='';
      // Cisco IOS style: no user, host set, cwd holds the mode terminator (#, >, (config)#)
      if(!usr && host && (cwd==='#'||cwd==='>'||/^\(config/.test(cwd)||/[#>]$/.test(cwd))){
        head='<span class="host">'+esc(host)+'</span><span class="sig">'+esc(cwd)+' </span>';
      }
      // Windows PowerShell / cmd style: host field carries the whole path prompt, cwd is the terminator (> etc.)
      else if(!usr && host){
        head='<span class="cwd">'+esc(host)+'</span><span class="sig">'+esc(cwd||'>')+' </span>';
      }
      // Standard unix user@host:cwd$
      else{
        head='<span class="usr">'+esc(usr)+'</span><span class="at">@</span><span class="host">'+esc(host)+'</span>'
           +'<span class="at">:</span><span class="cwd">'+esc(cwd)+'</span><span class="sig">$ </span>';
      }
      return '<div class="term-line term-prompt">'+head+'<span class="cmd">'+esc(ln.cmd||'')+'</span></div>';
    }
    if(ln.kind==='comment'){
      var t=(ln.text||'').replace(/^#\s?/,''); // cmt() already prepends '#'; CSS adds it back
      return '<div class="term-line term-cmt">'+esc(t)+'</div>';
    }
    return '<div class="term-line term-out">'+esc(ln.text||'')+'</div>';
  }
  function renderTerminal(b){
    var body=(b.lines||[]).map(renderTermLine).join('');
    var ttl=b.title?'<span class="tttl">'+esc(b.title)+(b.shell?'  \u00b7  '+esc(b.shell):'')+'</span>':'';
    return '<div class="term"><div class="term-bar"><span class="dots"><i></i><i></i><i></i></span>'+ttl+'</div>'
      +'<div class="term-body">'+body+'</div></div>';
  }
  // escape then convert `backtick` spans to inline code
  function richText(t){
    return esc(t).replace(/`([^`]+)`/g,'<code class="inline">$1</code>');
  }
  function renderBlock(b){
    switch(b.type){
      case 'heading': return '<h'+(b.level||2)+'>'+esc(b.text)+'</h'+(b.level||2)+'>';
      case 'paragraph': return '<p>'+richText(b.text)+'</p>';
      case 'list':
        var tag=b.ordered?'ol':'ul';
        return '<'+tag+'>'+(b.items||[]).map(function(i){return '<li>'+richText(i)+'</li>';}).join('')+'</'+tag+'>';
      case 'table':
        var th='<tr>'+(b.headers||[]).map(function(x){return '<th>'+esc(x)+'</th>';}).join('')+'</tr>';
        var tb=(b.rows||[]).map(function(r){return '<tr>'+r.map(function(x){return '<td>'+richText(x)+'</td>';}).join('')+'</tr>';}).join('');
        return '<table><thead>'+th+'</thead><tbody>'+tb+'</tbody></table>';
      case 'callout':
        var v=b.variant||'note';
        return '<div class="callout '+esc(v)+'"><div class="ct">'+esc(b.title||v.toUpperCase())+'</div><p>'+richText(b.text)+'</p></div>';
      case 'code':
        return '<pre class="code">'+(b.lang?'<span class="clang">'+esc(b.lang)+'</span>':'')+esc(b.text)+'</pre>';
      case 'terminal': return renderTerminal(b);
      default: return '';
    }
  }

  function renderBook(cert){
    var c=META.filter(function(x){return x.id===cert;})[0];
    var bk=BOOKS[cert];
    if(!bk){renderCert(cert);return;}
    var toc=bk.chapters.map(function(ch){
      return '<button class="toc-item" data-goto="#/'+cert+'/book/ch-'+ch.num+'">'
        +'<span class="tnum">'+ch.num+'</span>'
        +'<span class="tbody"><span class="tt">'+esc(ch.title)+'</span>'
        +'<span class="ts">'+esc(ch.summary||'')+'</span></span></button>';
    }).join('');
    main.innerHTML='<div class="crumbs"><a href="#/">Home</a> / <a href="#/'+cert+'">'+esc(c.name)+'</a> / Study Book</div>'
      +'<section class="book-overview"><span class="book-badge">STUDY BOOK \u00b7 '+esc(c.code)+'</span>'
      +'<div class="phead"><h1>'+esc(bk.title)+'</h1>'
      +'<p class="psub">'+bk.chapters.length+' chapters \u00b7 comprehensive exam preparation with '+(bookHasTerminal(bk)?'hands-on terminal examples':'worked examples and reference tables')+'</p></div>'
      +'<div class="toc">'+toc+'</div></section>';
  }

  function renderChapter(cert,num){
    var c=META.filter(function(x){return x.id===cert;})[0];
    var bk=BOOKS[cert];
    if(!bk){renderCert(cert);return;}
    var idx=-1;
    bk.chapters.forEach(function(ch,i){if(ch.num===num)idx=i;});
    if(idx<0){renderBook(cert);return;}
    var ch=bk.chapters[idx];
    var body=(ch.blocks||[]).map(renderBlock).join('');
    var prev=bk.chapters[idx-1], next=bk.chapters[idx+1];
    var pnav='<div class="chap-nav">';
    if(prev) pnav+='<button data-goto="#/'+cert+'/book/ch-'+prev.num+'"><span class="cnlbl">\u2190 Previous</span>'+esc(prev.title)+'</button>';
    else pnav+='<button disabled><span class="cnlbl">\u2190 Previous</span>Start of book</button>';
    if(next) pnav+='<button class="next" data-goto="#/'+cert+'/book/ch-'+next.num+'"><span class="cnlbl">Next \u2192</span>'+esc(next.title)+'</button>';
    else pnav+='<button class="next" disabled><span class="cnlbl">Next \u2192</span>End of book</button>';
    pnav+='</div>';
    main.innerHTML='<div class="crumbs"><a href="#/">Home</a> / <a href="#/'+cert+'">'+esc(c.name)+'</a> / <a href="#/'+cert+'/book">Study Book</a> / Chapter '+ch.num+'</div>'
      +'<div class="phead"><span class="book-badge">CHAPTER '+ch.num+' OF '+bk.chapters.length+'</span>'
      +'<h1>'+esc(ch.title)+'</h1><p class="psub">'+esc(ch.summary||'')+'</p></div>'
      +'<article class="prose">'+body+'</article>'+pnav;
  }

  function route(){
    var s=parseHash();
    if(s.view==='home')renderHome();
    else if(s.view==='search')renderSearch(s.query);
    else if(s.view==='cert')renderCert(s.cert);
    else if(s.view==='book')renderBook(s.cert);
    else if(s.view==='chapter')renderChapter(s.cert,s.ch);
    else if(s.view==='terminal')renderTerminalLab(s.cert);
    else if(s.view==='samples')renderScriptSamples(s.cert);
    else if(s.view==='labs')renderPBQ(s.cert);
    else if(s.view==='lab')renderLab(s.cert,s.lab);
    else if(s.view==='domains')renderDomainIndex(s.cert);
    else if(s.view==='domain')renderDomainQuiz(s.cert,s.dom,s.page,s.query);
    else renderSet(s.cert,s.page,s.query);
    syncSidebar(s);
    window.scrollTo({top:0,behavior:'auto'});
    // keep header input in sync with the search route
    if(gInput){gInput.value=(s.view==='search')?(s.query||''):'';toggleClear();}
  }

  // delegated goto buttons
  document.addEventListener('click',function(e){
    var g=e.target.closest('[data-goto]');
    if(g){location.hash=g.getAttribute('data-goto');}
  });
  menuBtn.addEventListener('click',function(){openMobile(!side.classList.contains('open'));});
  backdrop.addEventListener('click',function(){openMobile(false);});

  buildNav();
  window.addEventListener('hashchange',route);
  route();
})();
</script>
<script data-pplx-inline-edit>
(function () {
  if (window === window.top) return;

  const allowedParentOrigins = ["https://www.perplexity.ai","https://perplexity.ai","https://testing.perplexity.ai","https://staging.perplexity.ai","https://*.preview.i.perplexity.ai","http://localhost:3000","http://127.0.0.1:3000","http://localhost:5173","http://127.0.0.1:5173"];
  const MAX_FONT_BYTES = 500 * 1024;
  const MAX_TOTAL_FONT_BYTES = 2 * 1024 * 1024;
  let scrollForwarding = false;
  let scrollRaf = 0;
  let trustedTopOrigin = null;

  // Allow entries like "https://*.preview.i.perplexity.ai" — the wildcard
  // matches a single DNS label (no dots), so "https://*.foo" cannot stretch
  // across multiple labels.
  function matchesAllowedOrigin(origin) {
    if (!origin) return false;
    for (const entry of allowedParentOrigins) {
      if (!entry.includes("*")) {
        if (entry === origin) return true;
        continue;
      }
      const pattern = new RegExp(
        "^" +
          entry.replace(/[.+?^${}()|[\]\\]/g, "\\$&").replace(/\*/g, "[^.]+") +
          "$",
      );
      if (pattern.test(origin)) return true;
    }
    return false;
  }

  // Trust decision: when the sender is same-origin-visible (event.origin is a
  // real origin like https://www.perplexity.ai) we trust event.origin directly.
  // When event.origin is "null" (opaque broker srcdoc), we fall back to the
  // broker's stamped `parentOrigin` to identify the top window. The fallback
  // is claim-only — we rely on the browser's native `targetOrigin` enforcement
  // on the response path (see postToTrustedTop) to ensure replies can't be
  // delivered to anyone but the actual top window of that claimed origin.
  function getTrustedParentOrigin(event) {
    const forwardedParentOrigin =
      typeof event.data.parentOrigin === "string" ? event.data.parentOrigin : null;
    const parentOrigin = event.origin === "null" ? forwardedParentOrigin : event.origin;
    return matchesAllowedOrigin(parentOrigin) ? parentOrigin : null;
  }

  // All responses go to window.top with targetOrigin = the allowlisted origin.
  // An attacker that iframes us inside their own null-origin broker can claim
  // any parentOrigin they like, but the browser will drop the reply whenever
  // the real top's origin doesn't match — so the screenshot never leaves.
  function postToTrustedTop(message) {
    if (!trustedTopOrigin) return;
    try {
      window.top.postMessage(message, trustedTopOrigin);
    } catch (_error) {}
  }

  function inlineAll(original, clone) {
    if (original.nodeType !== 1 || clone.nodeType !== 1) return;

    try {
      const computedStyle = getComputedStyle(original);
      // cssText on a computed style is the serialized declaration in modern
      // Chromium/Safari — a single read beats enumerating ~400 longhand
      // properties. Firefox returns "" here, so we fall back on empty.
      const serialized = computedStyle.cssText;
      if (serialized) {
        clone.style.cssText = serialized;
      } else {
        const parts = new Array(computedStyle.length);
        for (let index = 0; index < computedStyle.length; index += 1) {
          const property = computedStyle[index];
          parts[index] = `${property}:${computedStyle.getPropertyValue(property)};`;
        }
        clone.style.cssText = parts.join("");
      }
    } catch (_error) {}

    const originalChildren = original.children;
    const clonedChildren = clone.children;
    for (
      let index = 0;
      index < originalChildren.length && index < clonedChildren.length;
      index += 1
    ) {
      inlineAll(originalChildren[index], clonedChildren[index]);
    }
  }

  function extractFontUrl(srcValue) {
    const matches = [
      ...srcValue.matchAll(
        /url\(["']?([^"')]+)["']?\)(?:\s*format\(["']?([^"')]+)["']?\))?/gi,
      ),
    ];
    if (matches.length === 0) return null;
    const woff2 = matches.find((m) => m[2] && m[2].toLowerCase().includes("woff2"));
    if (woff2) return woff2[1];
    const woff = matches.find((m) => m[2] && m[2].toLowerCase().includes("woff"));
    if (woff) return woff[1];
    return matches[0][1];
  }

  // Cache resolved font URL -> data URI across captures. Fonts on a page
  // essentially never change, and a batch run emits multiple captures back to
  // back — without this we'd refetch + re-base64 every time.
  const fontDataUriCache = new Map();
  const SRC_DECLARATION_RE = /src\s*:\s*[^;}]+/i;

  async function fetchAsDataUri(url) {
    if (fontDataUriCache.has(url)) return fontDataUriCache.get(url);
    let dataUri = null;
    try {
      const response = await fetch(url, { mode: "cors", credentials: "omit" });
      if (response.ok) {
        const blob = await response.blob();
        if (blob.size <= MAX_FONT_BYTES) {
          dataUri = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () =>
              resolve(typeof reader.result === "string" ? reader.result : null);
            reader.onerror = () => resolve(null);
            reader.readAsDataURL(blob);
          });
        }
      }
    } catch (_error) {
      dataUri = null;
    }
    fontDataUriCache.set(url, dataUri);
    return dataUri;
  }

  function collectFontFaceRuleTexts() {
    const rules = [];
    for (const sheet of document.styleSheets) {
      let cssRules;
      try {
        cssRules = sheet.cssRules;
      } catch (_error) {
        continue;
      }
      if (!cssRules) continue;
      for (const rule of cssRules) {
        const cssText = rule.cssText || "";
        if (cssText.startsWith("@font-face")) rules.push(cssText);
      }
    }
    return rules;
  }

  async function buildInlinedFontCss() {
    const ruleTexts = collectFontFaceRuleTexts();
    if (ruleTexts.length === 0) return null;

    const resolved = ruleTexts.map((cssText) => {
      if (!SRC_DECLARATION_RE.test(cssText)) return null;
      const srcMatch = cssText.match(/src\s*:\s*([^;}]+)[;}]/i);
      if (!srcMatch) return null;
      const url = extractFontUrl(srcMatch[1]);
      if (!url) return null;
      try {
        return { cssText, url: new URL(url, document.baseURI).href };
      } catch (_error) {
        return null;
      }
    });

    const dataUris = await Promise.all(
      resolved.map((entry) => (entry ? fetchAsDataUri(entry.url) : Promise.resolve(null))),
    );

    const inlined = [];
    let totalBytes = 0;
    for (let index = 0; index < resolved.length; index += 1) {
      const entry = resolved[index];
      const dataUri = dataUris[index];
      if (!entry || !dataUri) continue;
      const approxBytes = dataUri.length * 0.75;
      if (totalBytes + approxBytes > MAX_TOTAL_FONT_BYTES) break;
      totalBytes += approxBytes;
      inlined.push(entry.cssText.replace(SRC_DECLARATION_RE, `src: url("${dataUri}")`));
    }
    return inlined.length > 0 ? inlined.join("\n") : null;
  }

  function stripExternal(clone) {
    const images = clone.querySelectorAll("img");
    for (let index = 0; index < images.length; index += 1) {
      const src = images[index].getAttribute("src");
      if (src && !src.startsWith("data:")) images[index].removeAttribute("src");
    }

    const elements = clone.querySelectorAll("*");
    for (let index = 0; index < elements.length; index += 1) {
      const style = elements[index].style.cssText;
      if (style && style.includes("url(")) {
        elements[index].style.cssText = style.replace(
          /url\(["']?(?!data:)[^)"']*["']?\)/gi,
          "none",
        );
      }
    }
  }

  function emitScroll() {
    scrollRaf = 0;
    if (!scrollForwarding) return;
    postToTrustedTop({
      type: "INLINE_EDIT_SCROLL",
      scrollX: window.scrollX,
      scrollY: window.scrollY,
    });
  }

  window.addEventListener(
    "scroll",
    function () {
      if (!scrollForwarding || scrollRaf) return;
      scrollRaf = requestAnimationFrame(emitScroll);
    },
    { passive: true, capture: true },
  );

  async function handleCaptureRequest(event) {
    const requestId = event.data.requestId;
    const scrollX = window.scrollX;
    const scrollY = window.scrollY;
    const width = window.innerWidth;
    const height = window.innerHeight;

    function postResult(dataUrl) {
      postToTrustedTop({
        type: "INLINE_EDIT_SCREENSHOT_RESULT",
        requestId,
        dataUrl,
        scrollX,
        scrollY,
      });
    }

    try {
      // Wait for any pending web fonts to resolve so both inline metrics and
      // the @font-face inlining below see the same loaded faces.
      if (document.fonts && document.fonts.ready) {
        try {
          await document.fonts.ready;
        } catch (_error) {}
      }

      const clone = document.documentElement.cloneNode(true);
      inlineAll(document.documentElement, clone);

      const removedNodes = clone.querySelectorAll("script,link[rel=\"stylesheet\"],style");
      for (let index = 0; index < removedNodes.length; index += 1) {
        removedNodes[index].remove();
      }

      stripExternal(clone);

      // Re-embed web fonts as data-URI @font-face rules so the SVG rasterizer
      // can resolve them — external font URLs aren't fetched during
      // foreignObject rendering, which would otherwise force a fallback face
      // and change text metrics.
      const inlinedFontCss = await buildInlinedFontCss();
      if (inlinedFontCss) {
        const styleEl = document.createElement("style");
        styleEl.textContent = inlinedFontCss;
        const head = clone.querySelector("head");
        if (head) head.appendChild(styleEl);
        else clone.insertBefore(styleEl, clone.firstChild);
      }

      const html = new XMLSerializer().serializeToString(clone);
      const svg =
        `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">` +
        '<foreignObject width="100%" height="100%">' +
        `<div xmlns="http://www.w3.org/1999/xhtml" style="width:${width}px;height:${height}px;overflow:hidden">` +
        `<div style="position:relative;left:-${scrollX}px;top:-${scrollY}px">` +
        html +
        "</div></div></foreignObject></svg>";
      const svgUrl = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
      const image = new Image();
      image.onload = function () {
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(image, 0, 0);
        postResult(canvas.toDataURL("image/png"));
      };
      image.onerror = function () {
        postResult(null);
      };
      image.src = svgUrl;
    } catch (_error) {
      postResult(null);
    }
  }

  window.addEventListener("message", function (event) {
    if (!event.data) return;
    // Only accept messages from the direct parent frame. Blocks sibling /
    // unrelated-window postMessage senders that could otherwise reach us.
    if (event.source !== window.parent) return;

    const trustedParentOrigin = getTrustedParentOrigin(event);
    if (!trustedParentOrigin) return;
    trustedTopOrigin = trustedParentOrigin;

    if (event.data.type === "INLINE_EDIT_SCROLL_START") {
      scrollForwarding = true;
      emitScroll();
      return;
    }

    if (event.data.type === "INLINE_EDIT_SCROLL_STOP") {
      scrollForwarding = false;
      if (scrollRaf) cancelAnimationFrame(scrollRaf);
      scrollRaf = 0;
      return;
    }

    if (event.data.type !== "INLINE_EDIT_CAPTURE_REQUEST") return;

    handleCaptureRequest(event);
  });
})();


</script></body>
